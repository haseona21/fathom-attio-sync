name: Fathom Link Sync

on:
  schedule:
    - cron: "0 * * * *" # every hour
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run sync
        env:
          FATHOM_API_KEY: ${{ secrets.FATHOM_API_KEY }}
          ATTIO_API_KEY: ${{ secrets.ATTIO_API_KEY }}
        run: npx tsx src/fathom-sync.ts

      - name: Commit updated last_run.txt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_run.txt
          git diff --staged --quiet || git commit -m "chore: update last_run [skip ci]"
          git push
