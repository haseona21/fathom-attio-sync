name: Zoe Post-Call Notifications

on:
  schedule:
    # Every 10 min, 5am-9pm PT (12:00-04:00 UTC), weekdays
    - cron: "*/10 12-23 * * 1-5"
    - cron: "*/10 0-4 * * 2-6"
    # Catch-all at 9:10pm PT (04:10 UTC)
    - cron: "10 4 * * 2-6"
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run notification check
        env:
          ATTIO_API_KEY: ${{ secrets.ATTIO_API_KEY }}
          FATHOM_API_KEY: ${{ secrets.FATHOM_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: npx tsx src/notify.ts --window 10

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          [ -f notified_events.json ] && git add notified_events.json
          git diff --staged --quiet || git commit -m "chore: update notified_events [skip ci]"
          git push
